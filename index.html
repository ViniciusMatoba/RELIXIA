<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>RELIXIA — Heróis Sem Carteira Assinada</title>
  <script type="module" crossorigin src="/RELIXIA/assets/index-mkFlXTIo.js"></script>
  <link rel="stylesheet" crossorigin href="/RELIXIA/assets/index-CMG6lEX_.css">
</head>
<body>
  <div id="app">

    <!-- ══ HEADER GLOBAL — fixo em todas as telas ══ -->
    <header class="global-header">
      <div class="hub-top-brand">⚔️ RELIXIA</div>
      <div class="hub-top-resources">
        <span class="top-res">💰 <strong id="res-gold">0</strong></span>
        <span class="top-res">👥 <strong id="res-heroes">0</strong></span>
        <span class="top-res">⚗️ <strong id="res-mats">0</strong></span>
      </div>
      <button class="btn-force-reload" onclick="forceReload()" title="Forçar atualização">🔄</button>
    </header>

    <!-- ══ CONTEÚDO CENTRAL — alterna entre hub e combate ══ -->
    <main class="global-content">

      <!-- TELA: HUB -->
      <div id="hub-screen" class="screen active">
        <div class="hub-center">
          <div class="hub-title-block">
            <h1 class="hub-main-title">RELIXIA</h1>
            <p class="hub-main-sub">Heróis Sem Carteira Assinada</p>
          </div>
          <div class="hub-status-card">
            <div class="hub-status-row">
              <span class="hub-status-label">Masmorra ativa</span>
              <span class="hub-status-value" id="active-dungeon-name">Vila da Folha</span>
            </div>
            <div class="hub-status-row">
              <span class="hub-status-label">Total de kills</span>
              <span class="hub-status-value" id="total-kills">0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- TELA: COMBATE -->
      <div id="combat-screen" class="screen">
        <div class="combat-header">
          <button class="btn-back" id="btn-back-hub">← Voltar</button>
          <span id="combat-dungeon-name">Vila da Folha</span>
          <span>Kills: <strong id="combat-kills">0</strong></span>
        </div>
        <div id="phaser-container"></div>
        <div class="combat-heroes-strip" id="heroes-status"></div>
      </div>

    </main>

    <!-- ══ FOOTER GLOBAL — fixo em todas as telas ══ -->
    <footer class="global-footer">
      <button class="nav-btn" onclick="openModal('modal-dungeon')">
        <span class="nav-icon">🌀</span>
        <span class="nav-label">Masmorras</span>
      </button>
      <button class="nav-btn" onclick="openModal('modal-tavern')">
        <span class="nav-icon">🍺</span>
        <span class="nav-label">Taverna</span>
      </button>
      <button class="nav-btn nav-btn-center" onclick="openModal('modal-dungeon')">
        <span class="nav-icon-center">⚔️</span>
      </button>
      <button class="nav-btn" onclick="openModal('modal-forge')">
        <span class="nav-icon">🔨</span>
        <span class="nav-label">Forja</span>
      </button>
      <button class="nav-btn" onclick="openModal('modal-sanctuary')">
        <span class="nav-icon">✨</span>
        <span class="nav-label">Santuário</span>
      </button>
    </footer>

    <!-- ══ MODAIS ══ -->
    <div id="modal-dungeon" class="modal-overlay" onclick="closeModalOutside(event,'modal-dungeon')">
      <div class="modal">
        <div class="modal-header">
          <span>🌀 Portal de Masmorras</span>
          <button onclick="closeModal('modal-dungeon')">✕</button>
        </div>
        <div class="modal-body" id="dungeon-list"></div>
      </div>
    </div>

    <div id="modal-tavern" class="modal-overlay" onclick="closeModalOutside(event,'modal-tavern')">
      <div class="modal">
        <div class="modal-header">
          <span>🍺 Taverna Multiverso</span>
          <button onclick="closeModal('modal-tavern')">✕</button>
        </div>
        <div class="modal-body" id="tavern-list"></div>
      </div>
    </div>

    <div id="modal-forge" class="modal-overlay" onclick="closeModalOutside(event,'modal-forge')">
      <div class="modal">
        <div class="modal-header">
          <span>🔨 Forja Ancestral</span>
          <button onclick="closeModal('modal-forge')">✕</button>
        </div>
        <div class="modal-body" id="forge-list"></div>
      </div>
    </div>

    <div id="modal-sanctuary" class="modal-overlay" onclick="closeModalOutside(event,'modal-sanctuary')">
      <div class="modal">
        <div class="modal-header">
          <span>✨ Santuário das Criaturas</span>
          <button onclick="closeModal('modal-sanctuary')">✕</button>
        </div>
        <div class="modal-body">
          <div class="gacha-box">
            <div class="gacha-display" id="gacha-display">
              <span class="gacha-placeholder">?</span>
            </div>
            <div class="gacha-rates">
              <span class="rate common">⬜ Comum 60%</span>
              <span class="rate uncommon">🟩 Incomum 25%</span>
              <span class="rate rare">🟦 Raro 12%</span>
              <span class="rate legendary">🟨 Lendário 3%</span>
            </div>
            <button class="btn-summon" id="btn-summon">✨ Invocar Pet — 500 💰</button>
            <div id="pet-collection" class="pet-collection"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
