<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geek Pixel Idle</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">

    <!-- HUB DA CIDADE -->
    <div id="hub-screen" class="screen active">
      <div class="hub-bg">
        <div class="hub-title">
          <h1>⚔️ GEEK PIXEL IDLE</h1>
          <p class="hub-subtitle">Guilda Multiverso</p>
        </div>

        <div class="resources-bar">
          <span class="resource">💰 <span id="res-gold">0</span> Ouro</span>
          <span class="resource">👥 Heróis: <span id="res-heroes">0</span></span>
          <span class="resource">⚗️ Materiais: <span id="res-mats">0</span></span>
        </div>

        <div class="hub-buttons">
          <button class="hub-btn" onclick="openModal('modal-dungeon')">
            <span class="hub-btn-icon">🌀</span>
            <span class="hub-btn-label">Portal de Masmorras</span>
            <span class="hub-btn-desc">Enviar heróis para combate</span>
          </button>
          <button class="hub-btn" onclick="openModal('modal-tavern')">
            <span class="hub-btn-icon">🍺</span>
            <span class="hub-btn-label">Taverna Multiverso</span>
            <span class="hub-btn-desc">Recrutar heróis lendários</span>
          </button>
          <button class="hub-btn" onclick="openModal('modal-forge')">
            <span class="hub-btn-icon">🔨</span>
            <span class="hub-btn-label">Forja Ancestral</span>
            <span class="hub-btn-desc">Criar equipamentos icônicos</span>
          </button>
          <button class="hub-btn" onclick="openModal('modal-sanctuary')">
            <span class="hub-btn-icon">✨</span>
            <span class="hub-btn-label">Santuário das Criaturas</span>
            <span class="hub-btn-desc">Invocar pets lendários</span>
          </button>
        </div>

        <div class="guild-status">
          <span>🏰 Guilda: <strong>Multiverso</strong></span>
          <span>⚔️ Masmorra: <strong id="active-dungeon-name">Vila da Folha</strong></span>
          <span>💀 Kills: <strong id="total-kills">0</strong></span>
        </div>
      </div>
    </div>

    <!-- TELA DE COMBATE -->
    <div id="combat-screen" class="screen">
      <div class="combat-header">
        <button class="btn-back" id="btn-back-hub">← Voltar</button>
        <span id="combat-dungeon-name">Vila da Folha</span>
        <span>Kills: <strong id="combat-kills">0</strong></span>
      </div>
      <div id="phaser-container"></div>
      <div class="combat-footer" id="heroes-status"></div>
    </div>

    <!-- MODAL: PORTAL DE MASMORRAS -->
    <div id="modal-dungeon" class="modal-overlay" onclick="closeModalOutside(event,'modal-dungeon')">
      <div class="modal">
        <div class="modal-header">
          <span>🌀 Portal de Masmorras</span>
          <button onclick="closeModal('modal-dungeon')">✕</button>
        </div>
        <div class="modal-body" id="dungeon-list"></div>
      </div>
    </div>

    <!-- MODAL: TAVERNA -->
    <div id="modal-tavern" class="modal-overlay" onclick="closeModalOutside(event,'modal-tavern')">
      <div class="modal">
        <div class="modal-header">
          <span>🍺 Taverna Multiverso</span>
          <button onclick="closeModal('modal-tavern')">✕</button>
        </div>
        <div class="modal-body" id="tavern-list"></div>
      </div>
    </div>

    <!-- MODAL: FORJA -->
    <div id="modal-forge" class="modal-overlay" onclick="closeModalOutside(event,'modal-forge')">
      <div class="modal">
        <div class="modal-header">
          <span>🔨 Forja Ancestral</span>
          <button onclick="closeModal('modal-forge')">✕</button>
        </div>
        <div class="modal-body" id="forge-list"></div>
      </div>
    </div>

    <!-- MODAL: SANTUÁRIO -->
    <div id="modal-sanctuary" class="modal-overlay" onclick="closeModalOutside(event,'modal-sanctuary')">
      <div class="modal">
        <div class="modal-header">
          <span>✨ Santuário das Criaturas</span>
          <button onclick="closeModal('modal-sanctuary')">✕</button>
        </div>
        <div class="modal-body">
          <div class="gacha-box">
            <div class="gacha-display" id="gacha-display">
              <span class="gacha-placeholder">?</span>
            </div>
            <div class="gacha-rates">
              <span class="rate common">⬜ Comum 60%</span>
              <span class="rate uncommon">🟩 Incomum 25%</span>
              <span class="rate rare">🟦 Raro 12%</span>
              <span class="rate legendary">🟨 Lendário 3%</span>
            </div>
            <button class="btn-summon" id="btn-summon">✨ Invocar Pet — 500 💰</button>
            <div id="pet-collection" class="pet-collection"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
